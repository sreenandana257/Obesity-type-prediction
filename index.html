<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obesity Level Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
<div class="circle1"></div>
<div class="circle2"></div>
<div class="circle3"></div>
<div class="container">

    <h1>🏋️ Obesity Level Prediction</h1>

    <form action="/predict" method="POST">

        <label>👤 Gender</label>
        <select name="Gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>🎂 Age</label>
        <input type="number" name="Age" min="1" max="120" required>

        <label>📏 Height (m)</label>
        <input type="number" name="Height" min="1" max="2.5" step="0.01" required>

        <label>⚖ Weight (kg)</label>
        <input type="number" name="Weight" min="10" max="300" step="0.1" required>

        <label>👨‍👩‍👧 Family History with Overweight</label>
        <select name="FamilyHistory" required>
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>🍔 Frequent High-Calorie Food Consumption</label>
        <select name="FAVC" required>
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>🥗 Vegetable Consumption (FCVC)</label>
        <input type="number" name="FCVC" min="1" max="3" step="0.1" required>

        <label>🍽 Number of Main Meals (NCP)</label>
        <input type="number" name="NCP" min="1" max="4" step="0.1" required>

        <label>🍪 Food Between Meals (CAEC)</label>
        <select name="CAEC" required>
            <option value="">Select</option>
            <option value="no">No</option>
            <option value="Sometimes">Sometimes</option>
            <option value="Frequently">Frequently</option>
            <option value="Always">Always</option>
        </select>

        <label>🚬 Smoking</label>
        <select name="SMOKE" required>
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>💧 Daily Water Intake (CH2O)</label>
        <input type="number" name="CH2O" min="1" max="3" step="0.1" required>

        <label>📊 Calories Monitoring (SCC)</label>
        <select name="SCC" required>
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>🏃 Physical Activity Frequency (FAF)</label>
        <input type="number" name="FAF" min="0" max="3" step="0.1" required>

        <label>📱 Technology Usage Time (TUE)</label>
        <input type="number" name="TUE" min="0" max="2" step="0.1" required>

        <label>🍷 Alcohol Consumption (CALC)</label>
        <select name="CALC" required>
            <option value="">Select</option>
            <option value="no">No</option>
            <option value="Sometimes">Sometimes</option>
            <option value="Frequently">Frequently</option>
            <option value="Always">Always</option>
        </select>

        <label>🚗 Transportation</label>
        <select name="MTRANS" required>
            <option value="">Select</option>
            <option value="Walking">Walking</option>
            <option value="Bike">Bike</option>
            <option value="Motorbike">Motorbike</option>
            <option value="Public_Transportation">Public Transportation</option>
            <option value="Automobile">Automobile</option>
        </select>

        <button type="submit">
            🔮 Predict Obesity Level
        </button>

    </form>

    {% if prediction %}
    <div class="result">
        <h3>Predicted Obesity Category</h3>
        <h2>{{ prediction }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
