    <h1>🏋️ Obesity Level Prediction</h1>

    <form action="http://127.0.0.1:5000/predict" method="POST">

        <label>👤 Gender</label>
        <select name="Gender" required="" fdprocessedid="go0myf">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>🎂 Age</label>
        <input type="number" name="Age" min="1" max="120" required="" fdprocessedid="hlf1p9g">

        <label>📏 Height (m)</label>
        <input type="number" name="Height" min="1" max="2.5" step="0.01" required="" fdprocessedid="5xmkpl">

        <label>⚖ Weight (kg)</label>
        <input type="number" name="Weight" min="10" max="300" step="0.1" required="" fdprocessedid="pt7k9p">

        <label>👨‍👩‍👧 Family History with Overweight</label>
        <select name="FamilyHistory" required="" fdprocessedid="h6n38u">
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>🍔 Frequent High-Calorie Food Consumption</label>
        <select name="FAVC" required="" fdprocessedid="barja">
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>🥗 Vegetable Consumption (FCVC)</label>
        <input type="number" name="FCVC" min="1" max="3" step="0.1" required="" fdprocessedid="dwyclu">

        <label>🍽 Number of Main Meals (NCP)</label>
        <input type="number" name="NCP" min="1" max="4" step="0.1" required="" fdprocessedid="7w5afo">

        <label>🍪 Food Between Meals (CAEC)</label>
        <select name="CAEC" required="" fdprocessedid="onmbk2">
            <option value="">Select</option>
            <option value="no">No</option>
            <option value="Sometimes">Sometimes</option>
            <option value="Frequently">Frequently</option>
            <option value="Always">Always</option>
        </select>

        <label>🚬 Smoking</label>
        <select name="SMOKE" required="" fdprocessedid="equdil">
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>💧 Daily Water Intake (CH2O)</label>
        <input type="number" name="CH2O" min="1" max="3" step="0.1" required="" fdprocessedid="9rhou5">

        <label>📊 Calories Monitoring (SCC)</label>
        <select name="SCC" required="" fdprocessedid="mae69">
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>🏃 Physical Activity Frequency (FAF)</label>
        <input type="number" name="FAF" min="0" max="3" step="0.1" required="" fdprocessedid="ftpf5r">

        <label>📱 Technology Usage Time (TUE)</label>
        <input type="number" name="TUE" min="0" max="2" step="0.1" required="" fdprocessedid="g5v9n">

        <label>🍷 Alcohol Consumption (CALC)</label>
        <select name="CALC" required="" fdprocessedid="qokmi">
            <option value="">Select</option>
            <option value="no">No</option>
            <option value="Sometimes">Sometimes</option>
            <option value="Frequently">Frequently</option>
            <option value="Always">Always</option>
        </select>

        <label>🚗 Transportation</label>
        <select name="MTRANS" required="" fdprocessedid="5j1hn">
            <option value="">Select</option>
            <option value="Walking">Walking</option>
            <option value="Bike">Bike</option>
            <option value="Motorbike">Motorbike</option>
            <option value="Public_Transportation">Public Transportation</option>
            <option value="Automobile">Automobile</option>
        </select>

        <button type="submit" fdprocessedid="iqn4sb">
            🔮 Predict Obesity Level
